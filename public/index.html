<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bau-OS</title>
  <style>
    /* ── Design System ─────────────────────────────────────────────────────────
       Farben: Schwarz #000000 · Dunkelgrau #333333 · Mittelgrau #888888
               Hellgrau #CCCCCC · Sehr hell #F5F5F5 · Weiß #FFFFFF
       Schrift: system-ui / Calibri-äquivalent, serifenlos, zeitlos
    ─────────────────────────────────────────────────────────────────────────── */

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Calibri", "Aptos", system-ui, -apple-system, Arial, sans-serif;
      font-size: 14px;
      color: #333333;
      background: #F5F5F5;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Scrollbar ─── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #F5F5F5; }
    ::-webkit-scrollbar-thumb { background: #CCCCCC; border-radius: 2px; }

    /* ── Sidebar ─── */
    .sidebar {
      width: 210px;
      min-width: 210px;
      background: #000000;
      color: #FFFFFF;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #000000;
    }

    .sidebar-logo {
      padding: 24px 20px 20px;
      border-bottom: 1px solid #222222;
    }

    .sidebar-logo-title {
      font-size: 18pt;
      font-weight: 700;
      color: #FFFFFF;
      letter-spacing: -0.5px;
    }

    .sidebar-logo-sub {
      font-size: 10px;
      color: #888888;
      margin-top: 2px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .sidebar-status {
      padding: 10px 20px;
      border-bottom: 1px solid #222222;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #FFFFFF;
      flex-shrink: 0;
      animation: blink 3s infinite;
    }

    @keyframes blink { 0%, 90%, 100% { opacity: 1; } 95% { opacity: 0.3; } }

    .status-label {
      font-size: 11px;
      color: #888888;
    }

    .sidebar-nav {
      flex: 1;
      padding: 12px 10px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.12s;
      color: #888888;
      font-size: 13px;
      font-weight: 500;
      user-select: none;
    }

    .nav-item:hover { background: #1a1a1a; color: #CCCCCC; }
    .nav-item.active { background: #FFFFFF; color: #000000; }

    .nav-icon { font-size: 14px; width: 18px; text-align: center; flex-shrink: 0; }

    .sidebar-footer {
      padding: 14px 20px;
      border-top: 1px solid #222222;
      font-size: 10px;
      color: #444444;
      line-height: 1.6;
    }

    /* ── Main ─── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Topbar ─── */
    .topbar {
      background: #FFFFFF;
      border-bottom: 1px solid #CCCCCC;
      padding: 0 28px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .topbar-title {
      font-size: 16px;
      font-weight: 700;
      color: #000000;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .model-tag {
      font-size: 11px;
      color: #888888;
      border: 1px solid #CCCCCC;
      padding: 3px 10px;
      border-radius: 3px;
      background: #F5F5F5;
      font-weight: 600;
    }

    .btn-refresh {
      font-size: 12px;
      font-weight: 600;
      color: #333333;
      background: #F5F5F5;
      border: 1px solid #CCCCCC;
      padding: 5px 14px;
      border-radius: 3px;
      cursor: pointer;
      transition: background 0.1s;
      font-family: inherit;
    }

    .btn-refresh:hover { background: #EBEBEB; }

    /* ── Content ─── */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 28px;
    }

    /* ── Section header ─── */
    .section-head {
      margin-bottom: 22px;
    }

    .section-head h2 {
      font-size: 18pt;
      font-weight: 700;
      color: #000000;
      margin-bottom: 3px;
    }

    .section-head p {
      font-size: 11px;
      color: #888888;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* ── Divider ─── */
    .divider {
      height: 1px;
      background: #CCCCCC;
      margin: 20px 0;
    }

    /* ── Stat Cards ─── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: #FFFFFF;
      border: 1px solid #CCCCCC;
      border-radius: 3px;
      padding: 20px 18px;
      cursor: pointer;
      transition: border-color 0.12s, box-shadow 0.12s;
    }

    .stat-card:hover {
      border-color: #888888;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }

    .stat-card.active-card { border-color: #000000; border-width: 2px; }

    .stat-number {
      font-size: 36pt;
      font-weight: 700;
      color: #000000;
      line-height: 1;
      margin-bottom: 6px;
    }

    .stat-label {
      font-size: 10px;
      color: #888888;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
    }

    /* ── Cards ─── */
    .card {
      background: #FFFFFF;
      border: 1px solid #CCCCCC;
      border-radius: 3px;
    }

    .card-header {
      padding: 14px 18px;
      border-bottom: 1px solid #CCCCCC;
      font-size: 10px;
      font-weight: 700;
      color: #000000;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .card-body { padding: 16px 18px; }

    /* ── Grid ─── */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
    .grid-auto { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; }

    /* ── Info rows ─── */
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 0;
      border-bottom: 1px solid #F5F5F5;
      font-size: 13px;
    }

    .info-row:last-child { border-bottom: none; }
    .info-label { color: #888888; }
    .info-value { color: #333333; font-weight: 600; max-width: 55%; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ── Table ─── */
    .data-table { width: 100%; border-collapse: collapse; }

    .data-table th {
      text-align: left;
      padding: 9px 16px;
      font-size: 10px;
      font-weight: 700;
      color: #000000;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      background: #CCCCCC;
      border-bottom: 1px solid #CCCCCC;
    }

    .data-table td {
      padding: 11px 16px;
      font-size: 13px;
      color: #333333;
      border-bottom: 1px solid #F5F5F5;
    }

    .data-table tr:nth-child(even) td { background: #F5F5F5; }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: #EBEBEB !important; cursor: pointer; }

    /* ── Badge / Tag ─── */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 2px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .badge-dark { background: #333333; color: #FFFFFF; }
    .badge-light { background: #F5F5F5; color: #888888; border: 1px solid #CCCCCC; }

    /* ── List items ─── */
    .list-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 18px;
      border-bottom: 1px solid #F5F5F5;
      font-size: 13px;
    }

    .list-item:last-child { border-bottom: none; }
    .list-item:nth-child(even) { background: #F5F5F5; }

    .list-icon { color: #CCCCCC; flex-shrink: 0; margin-top: 1px; font-size: 13px; }
    .list-text { color: #333333; line-height: 1.5; }

    /* ── Agent cards ─── */
    .agent-card {
      background: #FFFFFF;
      border: 1px solid #CCCCCC;
      border-radius: 3px;
      padding: 20px;
    }

    .agent-avatar {
      width: 40px;
      height: 40px;
      background: #000000;
      color: #FFFFFF;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 14px;
      flex-shrink: 0;
    }

    .agent-name { font-size: 14pt; font-weight: 700; color: #000000; margin-bottom: 4px; }
    .agent-desc { font-size: 12px; color: #888888; margin-bottom: 14px; line-height: 1.4; }
    .agent-meta { font-size: 11px; color: #888888; }
    .agent-meta strong { color: #333333; }

    /* ── Project cards ─── */
    .project-card {
      background: #FFFFFF;
      border: 1px solid #CCCCCC;
      border-radius: 3px;
      padding: 18px;
    }

    .project-name { font-size: 13pt; font-weight: 700; color: #000000; margin-bottom: 14px; border-bottom: 1px solid #CCCCCC; padding-bottom: 10px; }

    .project-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

    .project-stat {
      text-align: center;
      padding: 10px 4px;
      background: #F5F5F5;
      border: 1px solid #CCCCCC;
      border-radius: 2px;
    }

    .project-stat-num { font-size: 18pt; font-weight: 700; color: #000000; }
    .project-stat-label { font-size: 9px; color: #888888; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }

    /* ── Empty state ─── */
    .empty {
      text-align: center;
      padding: 52px 24px;
      color: #CCCCCC;
    }

    .empty-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.5; }
    .empty-text { font-size: 13px; color: #888888; }

    /* ── Modal ─── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: #FFFFFF;
      border: 1px solid #CCCCCC;
      border-radius: 3px;
      width: 100%;
      max-width: 680px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }

    .modal-head {
      padding: 14px 20px;
      border-bottom: 1px solid #CCCCCC;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #F5F5F5;
    }

    .modal-head-title { font-size: 13px; font-weight: 700; color: #000000; }

    .modal-close {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      color: #888888;
      line-height: 1;
      padding: 0;
    }

    .modal-close:hover { color: #000000; }

    .modal-content {
      overflow-y: auto;
      padding: 22px;
      flex: 1;
    }

    .modal-content pre {
      font-family: inherit;
      font-size: 13px;
      line-height: 1.7;
      color: #333333;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* ── Animation ─── */
    .fade { animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<!-- ── SIDEBAR ──────────────────────────────────────────────────────────────── -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="sidebar-logo-title">Bau-OS</div>
    <div class="sidebar-logo-sub">System Dashboard</div>
  </div>

  <div class="sidebar-status">
    <div class="status-dot" id="status-dot"></div>
    <span class="status-label" id="status-label">Verbinde…</span>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-item active" data-section="overview" onclick="navigate('overview')">
      <span class="nav-icon">◼</span> Übersicht
    </div>
    <div class="nav-item" data-section="agents" onclick="navigate('agents')">
      <span class="nav-icon">◈</span> Agenten
    </div>
    <div class="nav-item" data-section="notes" onclick="navigate('notes')">
      <span class="nav-icon">◻</span> Notizen
    </div>
    <div class="nav-item" data-section="tasks" onclick="navigate('tasks')">
      <span class="nav-icon">◇</span> Aufgaben
    </div>
    <div class="nav-item" data-section="projects" onclick="navigate('projects')">
      <span class="nav-icon">▣</span> Projekte
    </div>
    <div class="nav-item" data-section="termine" onclick="navigate('termine')">
      <span class="nav-icon">◉</span> Termine
    </div>
  </nav>

  <div class="sidebar-footer">
    <div id="sidebar-uptime">—</div>
    <div style="margin-top:2px;">Bau-OS v0.1</div>
  </div>
</aside>

<!-- ── MAIN ─────────────────────────────────────────────────────────────────── -->
<div class="main">

  <header class="topbar">
    <span class="topbar-title" id="page-title">Übersicht</span>
    <div class="topbar-right">
      <span class="model-tag" id="model-tag">—</span>
      <button class="btn-refresh" onclick="loadAll()">↻ Aktualisieren</button>
    </div>
  </header>

  <main class="content">
    <div id="content">
      <div class="empty"><div class="empty-icon">◌</div><div class="empty-text">Wird geladen…</div></div>
    </div>
  </main>
</div>

<!-- ── MODAL ─────────────────────────────────────────────────────────────────── -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-head">
      <span class="modal-head-title" id="modal-title"></span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-content" id="modal-body"></div>
  </div>
</div>

<!-- ── SCRIPT ─────────────────────────────────────────────────────────────────── -->
<script>
const TITLES = { overview: 'Übersicht', agents: 'Agenten', notes: 'Notizen', tasks: 'Aufgaben', projects: 'Projekte', termine: 'Termine' };

const state = {
  current: 'overview',
  status: null, agents: [], notes: [], tasks: [], projects: [], termine: []
};

async function api(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(r.statusText);
  return r.json();
}

async function loadAll() {
  try {
    const [status, agents, notes, tasks, projects, termine] = await Promise.all([
      api('/api/status'), api('/api/agents'), api('/api/notes'),
      api('/api/tasks'), api('/api/projects'), api('/api/termine')
    ]);
    Object.assign(state, { status, agents, notes, tasks, projects, termine });
    updateChrome();
    render();
  } catch (e) {
    document.getElementById('status-label').textContent = 'Offline';
    document.getElementById('status-dot').style.background = '#CCCCCC';
    document.getElementById('content').innerHTML =
      `<div class="empty"><div class="empty-icon">✕</div><div class="empty-text">Verbindungsfehler: ${e.message}</div></div>`;
  }
}

function updateChrome() {
  const s = state.status;
  if (!s) return;
  document.getElementById('model-tag').textContent = s.model;
  document.getElementById('sidebar-uptime').textContent = 'Laufzeit: ' + s.uptime;
  document.getElementById('status-label').textContent = 'System aktiv';
}

function navigate(section) {
  state.current = section;
  document.querySelectorAll('.nav-item').forEach(el =>
    el.classList.toggle('active', el.dataset.section === section)
  );
  document.getElementById('page-title').textContent = TITLES[section];

  // stat cards — update active outline
  document.querySelectorAll('.stat-card').forEach(el =>
    el.classList.toggle('active-card', el.dataset.section === section)
  );

  render();
}

function render() {
  const el = document.getElementById('content');
  el.className = 'fade';
  void el.offsetWidth;
  const fns = { overview: renderOverview, agents: renderAgents, notes: renderNotes, tasks: renderTasks, projects: renderProjects, termine: renderTermine };
  el.innerHTML = (fns[state.current] || (() => ''))();
}

/* ── OVERVIEW ─────────────────────────────────────────────────────────────── */
function renderOverview() {
  const s = state.status;
  return `
    <div class="section-head">
      <h2>System-Übersicht</h2>
      <p>Kennzahlen & Status</p>
    </div>

    <div class="stats-grid">
      ${sCard('◈', 'Agenten',  s?.agentCount,   'agents')}
      ${sCard('◻', 'Notizen',  s?.noteCount,    'notes')}
      ${sCard('◇', 'Aufgaben', s?.taskCount,    'tasks')}
      ${sCard('▣', 'Projekte', s?.projectCount, 'projects')}
      ${sCard('◉', 'Termine',  s?.termineCount, 'termine')}
    </div>

    <div class="divider"></div>

    <div class="grid-2">
      <div class="card">
        <div class="card-header">System-Information</div>
        <div class="card-body">
          ${iRow('Modell',    s?.model    ?? '—')}
          ${iRow('Ollama',    s?.ollamaUrl ?? '—')}
          ${iRow('Zeitzone',  s?.timezone  ?? '—')}
          ${iRow('Fast Mode', s?.fastMode ? 'Aktiv' : 'Inaktiv')}
          ${iRow('Laufzeit',  s?.uptime   ?? '—')}
        </div>
      </div>

      <div class="card">
        <div class="card-header">Zuletzt in Inbox</div>
        <div style="overflow:hidden;">
          ${state.notes.slice(0,6).map((n,i) => `
            <div class="list-item" onclick="openNote('${n}')" style="cursor:pointer;">
              <span class="list-icon">◻</span>
              <span class="list-text">${n}</span>
            </div>
          `).join('') || emptySmall('Keine Notizen')}
        </div>
      </div>
    </div>
  `;
}

function sCard(icon, label, value, section) {
  return `
    <div class="stat-card${state.current === section ? ' active-card' : ''}" data-section="${section}" onclick="navigate('${section}')">
      <div style="font-size:11px; color:#888888; margin-bottom:10px;">${icon}</div>
      <div class="stat-number">${value ?? '—'}</div>
      <div class="stat-label">${label}</div>
    </div>
  `;
}

function iRow(label, value) {
  return `<div class="info-row"><span class="info-label">${label}</span><span class="info-value" title="${value}">${value}</span></div>`;
}

/* ── AGENTS ────────────────────────────────────────────────────────────────── */
function renderAgents() {
  if (!state.agents.length) return empty('◈', 'Keine Agenten konfiguriert');
  return `
    <div class="section-head">
      <h2>Agenten</h2>
      <p>${state.agents.length} Agent${state.agents.length !== 1 ? 'en' : ''} konfiguriert</p>
    </div>
    <div class="grid-auto">
      ${state.agents.map(a => `
        <div class="agent-card">
          <div class="agent-avatar">${a.name.charAt(0)}</div>
          <div class="agent-name">${a.name}</div>
          <div class="agent-desc">${a.description}</div>
          <div class="divider" style="margin:12px 0;"></div>
          <div class="agent-meta">
            <div style="margin-bottom:5px;">Modell: <strong>${a.model}</strong></div>
            <div>${a.protected ? '<span class="badge badge-dark">Geschützt</span>' : '<span class="badge badge-light">Standard</span>'}</div>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

/* ── NOTES ─────────────────────────────────────────────────────────────────── */
function renderNotes() {
  if (!state.notes.length) return empty('◻', 'Keine Notizen in der Inbox');
  return `
    <div class="section-head">
      <h2>Notizen</h2>
      <p>${state.notes.length} Einträge in der Inbox</p>
    </div>
    <div class="card">
      <table class="data-table">
        <thead>
          <tr>
            <th>Dateiname</th>
            <th style="width:80px; text-align:right;">Aktion</th>
          </tr>
        </thead>
        <tbody>
          ${state.notes.map(n => `
            <tr onclick="openNote('${n}')">
              <td><span style="color:#CCCCCC; margin-right:8px;">◻</span>${n}</td>
              <td style="text-align:right; color:#888888; font-size:12px;">Lesen →</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
}

/* ── TASKS ─────────────────────────────────────────────────────────────────── */
function renderTasks() {
  if (!state.tasks.length) return empty('◇', 'Alle Aufgaben erledigt');
  return `
    <div class="section-head">
      <h2>Offene Aufgaben</h2>
      <p>${state.tasks.length} offen</p>
    </div>
    <div class="card">
      ${state.tasks.map(t => `
        <div class="list-item">
          <span class="list-icon">◇</span>
          <span class="list-text">${t}</span>
        </div>
      `).join('')}
    </div>
  `;
}

/* ── PROJECTS ───────────────────────────────────────────────────────────────── */
function renderProjects() {
  if (!state.projects.length) return empty('▣', 'Keine Projekte vorhanden');
  return `
    <div class="section-head">
      <h2>Projekte</h2>
      <p>${state.projects.length} Projekt${state.projects.length !== 1 ? 'e' : ''}</p>
    </div>
    <div class="grid-auto">
      ${state.projects.map(p => `
        <div class="project-card">
          <div class="project-name">▣ ${p.name}</div>
          <div class="project-stats">
            ${pStat(p.notes,   'Notizen')}
            ${pStat(p.tasks,   'Aufgaben')}
            ${pStat(p.termine, 'Termine')}
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

function pStat(val, label) {
  return `
    <div class="project-stat">
      <div class="project-stat-num">${val}</div>
      <div class="project-stat-label">${label}</div>
    </div>
  `;
}

/* ── TERMINE ────────────────────────────────────────────────────────────────── */
function renderTermine() {
  if (!state.termine.length) return empty('◉', 'Keine anstehenden Termine');
  return `
    <div class="section-head">
      <h2>Termine</h2>
      <p>${state.termine.length} anstehend</p>
    </div>
    <div class="card">
      ${state.termine.map(t => `
        <div class="list-item">
          <span class="list-icon">◉</span>
          <span class="list-text">${t}</span>
        </div>
      `).join('')}
    </div>
  `;
}

/* ── HELPERS ────────────────────────────────────────────────────────────────── */
function empty(icon, text) {
  return `<div class="empty"><div class="empty-icon">${icon}</div><div class="empty-text">${text}</div></div>`;
}

function emptySmall(text) {
  return `<div style="padding:20px 18px; color:#CCCCCC; font-size:12px;">${text}</div>`;
}

async function openNote(name) {
  document.getElementById('modal-title').textContent = name;
  document.getElementById('modal-body').innerHTML = '<div style="color:#888888; padding:16px; font-size:13px;">Wird geladen…</div>';
  document.getElementById('modal').classList.add('open');
  try {
    const data = await api('/api/note/' + encodeURIComponent(name));
    document.getElementById('modal-body').innerHTML =
      `<pre>${data.content.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</pre>`;
  } catch {
    document.getElementById('modal-body').innerHTML = '<div style="color:#888888; padding:16px;">Fehler beim Laden.</div>';
  }
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal')) {
    document.getElementById('modal').classList.remove('open');
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

setInterval(loadAll, 60_000);
loadAll();
</script>
