# ============================================================
# Bau-OS Backup — Cron-Konfiguration
# ============================================================
#
# Installation:
#   sudo crontab -e
#   # Folgende Zeile hinzufuegen:
#   0 3 * * * /bin/bash /opt/bau-os/scripts/backup.sh >> /opt/bau-os/logs/backup.log 2>&1
#
# Zeitplan:
#   Taeglich um 03:00 Uhr
#   Logs werden nach /opt/bau-os/logs/backup.log geschrieben
#
# Was wird gesichert:
#   - Obsidian Vault (/opt/bau-os-vault/) — Notizen, Tasks, Termine, Agent-Memory
#   - .env — API-Keys, JWT_SECRET, Konfiguration
#   - data/ — users.json, tasks.json, team.json
#   - tools/ — Vom Agent erstellte dynamische Tools
#
# Was wird NICHT gesichert:
#   - node_modules/ — reinstallierbar via npm install
#   - dist/ — rebuildfaehig via npm run build
#   - logs/ — operationelle Daten, nicht kritisch
#
# Rotation:
#   Backups aelter als 7 Tage werden automatisch geloescht
#
# Restore:
#   tar -xzf /opt/bau-os-backups/bau-os-backup-YYYYMMDD-HHMMSS.tar.gz -C /
#   sudo systemctl restart bau-os
#
# Manuelles Backup:
#   sudo bash /opt/bau-os/scripts/backup.sh
#
# Benutzerdefinierte Pfade:
#   sudo bash /opt/bau-os/scripts/backup.sh /opt/bau-os /opt/bau-os-vault /mnt/backup
#
# ============================================================

# Cron-Zeile (in sudo crontab -e einfuegen):
0 3 * * * /bin/bash /opt/bau-os/scripts/backup.sh >> /opt/bau-os/logs/backup.log 2>&1
